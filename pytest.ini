[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q

markers =
    slow: marks tests as slow-running
    integration: marks tests that require external services

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
